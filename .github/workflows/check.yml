name: Check

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  call-check:
    uses: ./.github/workflows/reusable-check.yml

  artifact:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: call-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create plugin package
        run: |
          VERSION=${{ needs.call-check.outputs.version }}
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          BRANCH_NAME_SAFE=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          ZIP_NAME="git-files-sync-${VERSION}-${BRANCH_NAME_SAFE}.zip"
          zip -j "$ZIP_NAME" main.js manifest.json styles.css
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build-${{ needs.call-check.outputs.version }}-${{ github.sha }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 7
